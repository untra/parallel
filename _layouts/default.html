<!doctype html>
<html lang="{{ page.lang | default: site.default_lang }}">
{% include head.html %}
<body class="gb-shell">
  <div class="gb-device">
    <header class="gb-header">
      <h1 class="gb-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      {% include lang_switcher.html %}
    </header>
    <main class="gb-screen">
      {{ content }}
    </main>
    <footer class="gb-footer">
      <a href="{{ '/about/' | relative_url }}">{{ site.data.i18n[page.lang].nav_about | default: 'About' }}</a>
    </footer>
  </div>
</body>
</html>
