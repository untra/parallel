<!doctype html>
<html lang="{{ page.lang | default: site.default_lang }}">
{% include head.html %}
<body>
  <header class="site-header">
    <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.data.i18n[page.lang].site_title | default: site.title }}</a></h1>
    <nav class="header-nav">
      <a href="{{ '/about/' | relative_url }}">{{ site.data.i18n[page.lang].nav_about | default: 'About' }}</a> |
      <a href="{{ '/comparison/' | relative_url }}">{{ site.data.i18n[page.lang].nav_comparison | default: 'Comparison' }}</a> |
      {% include lang_switcher.html %}
    </nav>
  </header>
  <main class="site-main">
    {{ content }}
  </main>
</body>
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_tag }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.ga_tag }}');
  </script>
</html>
