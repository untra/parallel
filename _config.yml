title: "Interactive Pokemon Parallel Coordinates"
description: "An interactive parallel coordinates plot of every Pokemon across ten dimensions"
url: "https://parallel.untra.io"
baseurl: ""

plugins:
  - jekyll-polyglot

languages: ["en", "zh-cn", "fr", "ja"]
default_lang: "en"
exclude_from_localization: ["assets", "vendor", "scripts", "schemas", "node_modules", ".github"]
parallel_localization: true

sass:
  style: compressed
  sass_dir: assets/css

exclude:
  - node_modules
  - vendor
  - scripts
  - schemas
  - package.json
  - package-lock.json
  - README.md
