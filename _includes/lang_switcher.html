{% assign base = page.permalink | default: page.url %}
<nav class="lang-switcher" aria-label="language">
  {% for lang in site.languages %}
    {% assign label = site.data.i18n[lang].lang_label | default: lang %}
    {% if lang == page.lang %}
      <span class="current">{{ label }}</span>
    {% elsif lang == site.default_lang %}
      <a href="{{ base | relative_url }}" hreflang="{{ lang }}">{{ label }}</a>
    {% else %}
      <a href="{{ base | prepend: lang | prepend: '/' | relative_url }}" hreflang="{{ lang }}">{{ label }}</a>
    {% endif %}
  {% endfor %}
</nav>
