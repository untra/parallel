<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% assign resolved_title = page.title | default: site.data.i18n[page.lang].site_title | default: site.title %}
  {% assign resolved_description = page.description | default: site.data.i18n[page.lang].site_description | default: site.description %}
  <title>{{ resolved_title }}</title>
  <meta name="description" content="{{ resolved_description }}">
  <meta property="og:title" content="{{ resolved_title }}">
  <meta property="og:description" content="{{ resolved_description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:locale" content="{{ site.data.i18n[page.lang].og_locale | default: 'en_US' }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ resolved_title }}">
  <meta name="twitter:description" content="{{ resolved_description }}">
  {% I18n_Headers %}
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/chart.css' | relative_url }}">
  <script src="https://cdn.jsdelivr.net/npm/d3@7" defer></script>
</head>
